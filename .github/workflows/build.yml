name: Build and Release

on:
  push:
    branches:
      - main # 在推送到 main 分支时触发
    tags:
      - 'v*' # 当推送包含 v 开头的标签时触发，例如 v1.0.0

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            GOOS: linux
            GOARCH: amd64
            artifact_name: airdropsbot-linux
            asset_name: airdropsbot-linux-amd64
          - os: windows-latest
            GOOS: windows
            GOARCH: amd64
            artifact_name: airdropsbot-windows.exe
            asset_name: airdropsbot-windows-amd64.exe
          - os: macos-latest
            GOOS: darwin
            GOARCH: amd64
            artifact_name: airdropsbot-macos
            asset_name: airdropsbot-macos-amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.1'
          check-latest: true
          cache: true

      - name: Verify repository
        run: |
          pwd
          ls -la
          go version

      - name: Get dependencies
        run: |
          go mod download
          go mod verify

      - name: Build
        env:
          GOOS: ${{ matrix.GOOS }}
          GOARCH: ${{ matrix.GOARCH }}
        run: |
          echo "Current directory structure:"
          find . -type d
          echo "=== Building for $GOOS/$GOARCH ==="
          cd cmd/airdropsbot
          go build -v -o "../../${{ matrix.artifact_name }}" .

      - name: Create config template
        run: |
          cat > config.template.json << 'EOF'
          {
            "password": "your-password",
            "interval_seconds": 30,
            "email": {
              "smtpCode": "your-smtp-code",
              "smtpCodeType": "qq",
              "smtpEmail": "your-email@qq.com",
              "ColaKey": "your-cola-key",
              "tomail": ["recipient@example.com"]
            }
          }
          EOF

      - name: Verify build artifacts
        run: |
          ls -la
          file ${{ matrix.artifact_name }}
          sha256sum ${{ matrix.artifact_name }} > ${{ matrix.artifact_name }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            ${{ matrix.artifact_name }}
            ${{ matrix.artifact_name }}.sha256
            config.template.json
            README.md

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Prepare release assets
        run: |
          ls -R
          find . -type f -name "*.sha256" -exec cat {} \;

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            */airdropsbot-*
            */config.template.json
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}