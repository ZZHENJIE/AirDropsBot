name: PC Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # 允许手动触发工作流
  workflow_dispatch:
  
env:
  # 使用日期作为版本号的一部分
  VERSION: 1.0.0-${{ github.run_number }}

jobs:
  build:
    name: Build PC Binaries
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        include:
          - os: windows
            arch: amd64
            suffix: .exe
          - os: windows
            arch: 386
            suffix: .exe
          - os: darwin
            arch: amd64
            suffix: ""
          - os: darwin
            arch: arm64
            suffix: ""
          - os: linux
            arch: amd64
            suffix: ""
          - os: linux
            arch: 386
            suffix: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.1'
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          echo "Current working directory: $PWD"
          echo "Repository contents:"
          ls -la
          
          # 设置 GOPATH 和构建环境
          export GOPATH=$HOME/go
          export PATH=$PATH:$GOPATH/bin
          
          # 显示 Go 环境
          go version
          go env GOPATH GOROOT GOOS GOARCH
          
          # 构建准备
          OUTPUT="AirDropsBot${{ matrix.suffix }}"
          echo "Building for ${{ matrix.os }}/${{ matrix.arch }}..."
          
          # 安装依赖
          go mod download
          go mod verify
          
          # 构建可执行文件
          echo "Building executable..."
          CGO_ENABLED=0 go build -v -o "$OUTPUT"
          
          # 创建配置模板
          echo "Creating config template..."
          cat > config.template.json << 'EOF'
          {
            "password": "your-password",
            "interval_seconds": 30,
            "email": {
              "smtpCode": "your-smtp-code",
              "smtpCodeType": "qq",
              "smtpEmail": "your-email@qq.com",
              "ColaKey": "your-cola-key",
              "tomail": ["recipient@example.com"]
            }
          }
          EOF
          
          # 生成校验和
          echo "Generating checksums..."
          sha256sum "$OUTPUT" > "$OUTPUT.sha256"
          
          # 显示构建结果
          echo "Build results:"
          ls -lh "$OUTPUT"*
          cat "$OUTPUT.sha256"

      - name: Prepare Release Package
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          # 设定输出文件名
          OUTPUT="AirDropsBot${{ matrix.suffix }}"
          
          # 创建发布目录
          RELEASE_DIR="AirDropsBot-${{ matrix.os }}-${{ matrix.arch }}"
          mkdir -p "$RELEASE_DIR"
          
          echo "Preparing release package..."
          echo "Source file: $OUTPUT"
          echo "Release directory: $RELEASE_DIR"
          ls -la
          
          # 复制文件到发布目录
          cp "$OUTPUT" "$RELEASE_DIR/AirDropsBot${{ matrix.suffix }}"
          cp "$OUTPUT.sha256" "$RELEASE_DIR/AirDropsBot${{ matrix.suffix }}.sha256"
          cp config.template.json "$RELEASE_DIR/"
          cp README.md "$RELEASE_DIR/"
          
          # 显示发布目录内容
          echo "Release directory contents:"
          ls -lR "$RELEASE_DIR"
          
          # 创建压缩包
          echo "Creating archive..."
          if [ "${{ matrix.os }}" = "windows" ]; then
            zip -r "${RELEASE_DIR}.zip" "$RELEASE_DIR"
            echo "Created zip archive: ${RELEASE_DIR}.zip"
          else
            tar czf "${RELEASE_DIR}.tar.gz" "$RELEASE_DIR"
            echo "Created tar.gz archive: ${RELEASE_DIR}.tar.gz"
          fi
          
          # 显示最终结果
          echo "Final artifacts:"
          ls -lh ${RELEASE_DIR}.*

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AirDropsBot-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            AirDropsBot-${{ matrix.os }}-${{ matrix.arch }}.*
          retention-days: 7

  create-release:
    needs: build
    runs-on: ubuntu-latest
    # 只在 main 分支上运行
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      
    steps:
      # 检出代码，这样我们可以创建标签
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      # 配置 Git
      - name: Setup Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
      
      # 创建新标签
      - name: Create Tag
        run: |
          echo "Creating new tag v${{ env.VERSION }}"
          git tag "v${{ env.VERSION }}"
          git push origin "v${{ env.VERSION }}"
          
  release:
    needs: create-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Display structure
        run: ls -R

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            */AirDropsBot-*.zip
            */AirDropsBot-*.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          body: |
            ## AirDropsBot Release v${{ env.VERSION }}
            
            ### 版本信息
            - 版本号: v${{ env.VERSION }}
            - 发布时间: ${{ github.event.head_commit.timestamp }}
            - 提交信息: ${{ github.event.head_commit.message }}
            
            ### 支持的平台
            - Windows (64/32位)
            - macOS (Intel/ARM)
            - Linux (64/32位)
            
            ### 校验和
            每个发布包都包含 SHA256 校验和文件
            
            ### 安装说明
            1. 下载对应平台的压缩包
            2. 解压缩
            3. 重命名 config.template.json 为 config.json 并修改配置
            4. 运行可执行文件
            
            ### 更新内容
            自动构建于 main 分支的最新提交
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}