name: PC Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # 允许手动触发工作流
  workflow_dispatch:

jobs:
  build:
    name: Build PC Binaries
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        include:
          - os: windows
            arch: amd64
            suffix: .exe
          - os: windows
            arch: 386
            suffix: .exe
          - os: darwin
            arch: amd64
            suffix: ""
          - os: darwin
            arch: arm64
            suffix: ""
          - os: linux
            arch: amd64
            suffix: ""
          - os: linux
            arch: 386
            suffix: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.1'
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          echo "Current working directory: $PWD"
          echo "Repository contents:"
          ls -la
          
          # 设置 GOPATH 和构建环境
          export GOPATH=$HOME/go
          export PATH=$PATH:$GOPATH/bin
          
          # 显示 Go 环境
          go version
          go env GOPATH GOROOT GOOS GOARCH
          
          # 构建准备
          OUTPUT="airdropsbot-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.suffix }}"
          echo "Building for ${{ matrix.os }}/${{ matrix.arch }}..."
          
          # 安装依赖
          go mod download
          go mod verify
          
          # 构建可执行文件
          echo "Building executable..."
          CGO_ENABLED=0 go build -v -o "$OUTPUT" .
          
          # 创建配置模板
          echo "Creating config template..."
          cat > config.template.json << 'EOF'
          {
            "password": "your-password",
            "interval_seconds": 30,
            "email": {
              "smtpCode": "your-smtp-code",
              "smtpCodeType": "qq",
              "smtpEmail": "your-email@qq.com",
              "ColaKey": "your-cola-key",
              "tomail": ["recipient@example.com"]
            }
          }
          EOF
          
          # 生成校验和
          echo "Generating checksums..."
          sha256sum "$OUTPUT" > "$OUTPUT.sha256"
          
          # 显示构建结果
          echo "Build results:"
          ls -lh "$OUTPUT"*
          cat "$OUTPUT.sha256"

      - name: Prepare Release Package
        run: |
          # 创建发布目录
          RELEASE_DIR="release-${{ matrix.os }}-${{ matrix.arch }}"
          mkdir -p "$RELEASE_DIR"
          
          # 复制文件到发布目录
          cp "$OUTPUT" "$RELEASE_DIR/"
          cp "$OUTPUT.sha256" "$RELEASE_DIR/"
          cp config.template.json "$RELEASE_DIR/"
          cp README.md "$RELEASE_DIR/"
          
          # 创建压缩包
          if [ "${{ matrix.os }}" = "windows" ]; then
            zip -r "${RELEASE_DIR}.zip" "$RELEASE_DIR"
          else
            tar czf "${RELEASE_DIR}.tar.gz" "$RELEASE_DIR"
          fi
          
          # 显示打包结果
          ls -lh ${RELEASE_DIR}.*

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: airdropsbot-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            release-${{ matrix.os }}-${{ matrix.arch }}.*
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Display structure
        run: ls -R

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            */*.zip
            */*.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## AirDropsBot Release
            
            ### 支持的平台
            - Windows (64/32位)
            - macOS (Intel/ARM)
            - Linux (64/32位)
            
            ### 校验和
            每个发布包都包含 SHA256 校验和文件
            
            ### 安装说明
            1. 下载对应平台的压缩包
            2. 解压缩
            3. 重命名 config.template.json 为 config.json 并修改配置
            4. 运行可执行文件
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}